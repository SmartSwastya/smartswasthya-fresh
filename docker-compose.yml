services:
  smart_db:
    image: postgres:15
    container_name: smart_db
    restart: always
    environment:
      TZ: Asia/Kolkata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword
      POSTGRES_DB: smartswasthya
    ports:
      - "5432:5432"
    volumes:
      - smart_pgdata:/var/lib/postgresql/data

  smart_redis:
    image: redis:alpine
    container_name: smart_redis
    restart: always
    ports:
      - "6379:6379"

  smart_app:
    build:
      context: .
      dockerfile: Dockerfile
      target: smart_app
    container_name: smart_app
    restart: always
    depends_on:
      - smart_db
      - smart_redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./records:/app/records:rw
      - ./tools:/app/tools
    working_dir: /app
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # user: celeryuser

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: smart_app  # 🟢 No separate build stage needed
    container_name: celery
    restart: always
    depends_on:
      - smart_db
      - smart_redis
    volumes:
      - .:/app
    environment:
      - APP_MODE=celery
      - CELERY_BROKER_URL=redis://smart_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://smart_redis:6379/1
      - PYTHONPATH=/app
    working_dir: /app
    user: celeryuser
    command: celery -A celery_app.celery_app worker --loglevel=warning

volumes:
  smart_pgdata:
    external: true
